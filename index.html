<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⭐ 摇一摇 星星雨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0b0e2a 0%, #1a1a3e 50%, #0b0e2a 100%);
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ===== 背景装饰星星 ===== */
        #bg-stars {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
        }
        .bg-star {
            position: absolute;
            color: rgba(255, 255, 255, 0.15);
            font-size: 14px;
            animation: twinkle 2s ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.8); }
            100% { opacity: 0.5; transform: scale(1.2); }
        }

        /* ===== 计数器 ===== */
        #counter {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            text-align: center;
            pointer-events: none;
            user-select: none;
        }
        #count-number {
            font-size: 100px;
            font-weight: 900;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #FFD700, #FF6B6B, #A29BFE, #4ECDC4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease-in-out infinite;
            line-height: 1;
            filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.3));
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        #count-label {
            display: block;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.3);
            font-family: Arial, sans-serif;
            letter-spacing: 4px;
            margin-top: 8px;
            font-weight: 300;
        }

        /* ===== 提示文字 ===== */
        #hint {
            position: fixed;
            bottom: 60px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 16px;
            pointer-events: none;
            user-select: none;
            z-index: 10;
            letter-spacing: 2px;
            transition: opacity 0.5s;
        }
        #hint small {
            display: block;
            font-size: 12px;
            opacity: 0.5;
            margin-top: 4px;
        }

        /* ===== ⭐ 真正的星星！ ===== */
        .star {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            font-size: 30px;
            line-height: 1;
            text-align: center;
            will-change: transform, opacity;
            filter: drop-shadow(0 0 10px currentColor);
            transition: none;
        }
        /* 星星发光动画 */
        .star.glow {
            animation: starGlow 1s ease-in-out infinite alternate;
        }
        @keyframes starGlow {
            0% { filter: drop-shadow(0 0 5px currentColor) scale(0.9); }
            100% { filter: drop-shadow(0 0 25px currentColor) scale(1.1); }
        }

        /* ===== 闪白效果 ===== */
        #flash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.1s;
        }
        #flash.active {
            opacity: 1;
            transition: opacity 0s;
        }

        /* ===== 激活按钮 ===== */
        #activateBtn {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 50;
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            touch-action: none;
        }
        #activateBtn.active {
            display: none;
        }
    </style>
</head>
<body>

    <button id="activateBtn" aria-label="点击激活"></button>

    <div id="bg-stars"></div>
    <div id="flash"></div>

    <div id="counter">
        <span id="count-number">0</span>
        <span id="count-label">✦ 颗星星</span>
    </div>

    <div id="hint">
        📱 摇一摇手机
        <small>👆 点击屏幕激活</small>
    </div>

    <script>
        // ============================================================
        //  配置
        // ============================================================
        const STAR_SYMBOLS = ['★', '✦', '✧', '⭐'];
        const COLORS = ['#FFD700', '#FF6B6B', '#4ECDC4', '#FF9F43', '#A29BFE', '#FD79A8', '#00CEC9', '#FDCB6E', '#FF4757', '#2ED573', '#7BED9F', '#70A1FF'];

        // ============================================================
        //  DOM
        // ============================================================
        const countNumber = document.getElementById('count-number');
        const hintEl = document.getElementById('hint');
        const flashEl = document.getElementById('flash');
        const activateBtn = document.getElementById('activateBtn');
        const bgContainer = document.getElementById('bg-stars');

        // ============================================================
        //  生成背景装饰星星
        // ============================================================
        function generateBgStars() {
            for (let i = 0; i < 50; i++) {
                const el = document.createElement('div');
                el.className = 'bg-star';
                el.textContent = '★';
                el.style.left = Math.random() * 100 + '%';
                el.style.top = Math.random() * 100 + '%';
                el.style.fontSize = (8 + Math.random() * 16) + 'px';
                el.style.animationDelay = (Math.random() * 3) + 's';
                el.style.color = `rgba(255,255,255,${0.1 + Math.random() * 0.2})`;
                bgContainer.appendChild(el);
            }
        }
        generateBgStars();

        // ============================================================
        //  星星系统
        // ============================================================
        let stars = [];
        let starId = 0;
        let totalStars = 0;

        function spawnStars(count) {
            if (stars.length > 600) {
                const remove = stars.splice(0, 100);
                remove.forEach(s => s.el.remove());
            }

            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'star';

                const symbol = STAR_SYMBOLS[Math.floor(Math.random() * STAR_SYMBOLS.length)];
                const color = COLORS[Math.floor(Math.random() * COLORS.length)];
                el.textContent = symbol;
                el.style.color = color;

                const w = window.innerWidth,
                    h = window.innerHeight;
                const size = 18 + Math.random() * 32;
                el.style.fontSize = size + 'px';

                // 从边缘进入
                const side = Math.floor(Math.random() * 4);
                let x, y;
                switch (side) {
                    case 0:
                        x = -60;
                        y = Math.random() * h;
                        break;
                    case 1:
                        x = w + 60;
                        y = Math.random() * h;
                        break;
                    case 2:
                        x = Math.random() * w;
                        y = -60;
                        break;
                    case 3:
                        x = Math.random() * w;
                        y = h + 60;
                        break;
                }

                const tx = Math.random() * w * 0.7 + w * 0.15;
                const ty = Math.random() * h * 0.7 + h * 0.15;

                el.style.left = x + 'px';
                el.style.top = y + 'px';
                document.body.appendChild(el);

                // 随机发光动画
                if (Math.random() > 0.5) {
                    el.classList.add('glow');
                }

                stars.push({
                    id: starId++,
                    el: el,
                    x: x,
                    y: y,
                    targetX: tx,
                    targetY: ty,
                    vx: (tx - x) / (20 + Math.random() * 35),
                    vy: (ty - y) / (20 + Math.random() * 35),
                    life: 1,
                    decay: 0.0015 + Math.random() * 0.005,
                    size: size,
                    color: color,
                    symbol: symbol,
                    rotation: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 3,
                    trail: [],
                    maxTrail: 12,
                });
            }
            updateCount();
        }

        function updateCount() {
            countNumber.textContent = totalStars;
        }

        function animateStars() {
            const toRemove = [];
            const w = window.innerWidth,
                h = window.innerHeight;

            for (let i = 0; i < stars.length; i++) {
                const s = stars[i];
                if (!s || !s.el) { toRemove.push(i); continue; }

                s.x += s.vx;
                s.y += s.vy;

                const dx = s.targetX - s.x;
                const dy = s.targetY - s.y;
                s.vx += dx * 0.02;
                s.vy += dy * 0.02;
                s.vx += (Math.random() - 0.5) * 0.05;
                s.vy += (Math.random() - 0.5) * 0.05;

                s.life -= s.decay;
                s.rotation += s.rotSpeed;

                if (s.life <= 0 || s.x < -400 || s.x > w + 400 || s.y < -400 || s.y > h + 400) {
                    toRemove.push(i);
                    continue;
                }

                // 拖尾（用星星残影）
                s.trail.push({ x: s.x, y: s.y });
                if (s.trail.length > s.maxTrail) s.trail.shift();

                const life = Math.max(0, s.life);
                const sz = s.size * (0.5 + 0.5 * life);

                // 主星星
                s.el.style.left = s.x + 'px';
                s.el.style.top = s.y + 'px';
                s.el.style.fontSize = sz + 'px';
                s.el.style.opacity = life;
                s.el.style.transform = `rotate(${s.rotation}deg) scale(${0.6 + 0.4 * life})`;
                s.el.style.filter = `drop-shadow(0 0 ${10 + 20 * life}px ${s.color})`;

                // 拖尾残影（用文字阴影）
                let textShadow = '';
                for (let t = 0; t < s.trail.length; t++) {
                    const p = s.trail[t];
                    const alpha = (t / s.trail.length) * 0.3 * life;
                    const ts = sz * (t / s.trail.length) * 0.4;
                    textShadow += `${p.x - s.x}px ${p.y - s.y}px ${ts}px ${s.color}${Math.floor(alpha * 80).toString(16).padStart(2, '0')}, `;
                }
                s.el.style.textShadow = textShadow.slice(0, -2) || 'none';
            }

            toRemove.sort((a, b) => b - a);
            for (const idx of toRemove) {
                const s = stars[idx];
                if (s && s.el && s.el.parentNode) s.el.remove();
                stars.splice(idx, 1);
            }

            requestAnimationFrame(animateStars);
        }

        // ============================================================
        //  摇一摇
        // ============================================================
        let shakeListenerActive = false;
        let lastShakeTime = 0;
        let lastGamma = 0,
            lastBeta = 0;
        let firstReading = true;

        function handleOrientation(event) {
            if (!shakeListenerActive) return;

            const gamma = event.gamma || 0;
            const beta = event.beta || 0;

            if (firstReading) {
                lastGamma = gamma;
                lastBeta = beta;
                firstReading = false;
                return;
            }

            const delta = Math.abs(gamma - lastGamma) + Math.abs(beta - lastBeta);

            if (delta > 15) {
                const now = Date.now();
                if (now - lastShakeTime > 150) {
                    lastShakeTime = now;

                    const count = 25 + Math.floor(Math.random() * 30);
                    spawnStars(count);
                    totalStars += count;
                    updateCount();

                    flashEl.classList.add('active');
                    setTimeout(() => flashEl.classList.remove('active'), 150);

                    if (navigator.vibrate) navigator.vibrate(15);

                    hintEl.style.opacity = '0.1';
                    clearTimeout(window._hintReset);
                    window._hintReset = setTimeout(() => {
                        hintEl.style.opacity = '0.4';
                    }, 500);
                }
            }

            lastGamma = gamma;
            lastBeta = beta;
        }

        // ---- iOS 权限 ----
        function requestPermissionAndStart() {
            if (shakeListenerActive) return;

            if (!window.DeviceOrientationEvent) {
                return;
            }

            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            shakeListenerActive = true;
                            firstReading = true;
                            hintEl.textContent = '📱 摇一摇 ⭐ 星星雨';
                            activateBtn.classList.add('active');
                        }
                    })
                    .catch(() => {});
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                shakeListenerActive = true;
                firstReading = true;
                hintEl.textContent = '📱 摇一摇 ⭐ 星星雨';
                activateBtn.classList.add('active');
            }
        }

        // ---- 点击激活 ----
        function handleActivate() {
            spawnStars(8 + Math.floor(Math.random() * 10));
            totalStars += 8 + Math.floor(Math.random() * 10);
            updateCount();

            if (!shakeListenerActive) {
                requestPermissionAndStart();
            }
        }

        activateBtn.addEventListener('click', handleActivate);
        activateBtn.addEventListener('touchstart', handleActivate, { passive: true });

        document.addEventListener('click', handleActivate);
        document.addEventListener('touchstart', handleActivate, { passive: true });

        // ============================================================
        //  启动
        // ============================================================
        animateStars();

        // 开场来一波
        setTimeout(() => {
            spawnStars(20);
            totalStars += 20;
            updateCount();
        }, 300);

        console.log('⭐ 真·星星雨已启动！摇一摇~');
    </script>
</body>
</html>
